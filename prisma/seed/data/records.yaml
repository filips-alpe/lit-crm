  date: 1778-07-01T00:00:00.000Z
  sum: 1000
  totalPrice: 1000
  note: Quarterly to E. Bancroft, secretary to the Commission. Mr Adams and Mr Lee insist he is in the pay of London also; let him stay where I can watch him.
  idNote: legation ledger
  priceNote: l.t.
- order: legation-paris-1776-1785
  type: note
  date: 1779-09-23T00:00:00.000Z
  note: 'Action off Flamborough Head. Bonhomme Richard takes the Serapis though sinking under her. Capt. Jones''s reply to the British call to strike: "I have not yet begun to fight."'
  idNote: Jones dispatches
- order: correspondance-philosophes
  type: lettre
  date: 1779-10-19T00:00:00.000Z
  allDay: true
  note: Wrote to Mme Helvétius — declining (again) her marriage proposal, in the form of a fable about the bees of Auteuil and their preference for their old hive. Sent it with a pot of honey.
  idNote: PBF vol 30 doc 547
  bookNote: the Auteuil bagatelle, to be set at the Passy press
