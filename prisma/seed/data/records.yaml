  title: "Embrace with Voltaire at the Loge des Neuf Sœurs"
  description: "Embraced à l'américaine before the applauding assembly."
  text: >-
    At the Loge des Neuf Sœurs. M. de Voltaire and self, after twenty minutes
    of formal salutation in French, embraced à l'américaine. The assembly
    applauded for some minutes. The old man trembling, much aged. He spoke to
    me of Calas and of the Address to Congress he had drafted on hearing of the
    alliance.
