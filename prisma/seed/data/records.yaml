  endDate: 1778-02-06T13:23:26.000Z
  note: Signed, with France, the Treaty of Alliance and the Treaty of Amity and Commerce at the Hôtel de Coislin. Wore my Manchester velvet suit of the Cockpit, by deliberate intention.
  idNote: Treaty of Alliance, 6 Feb 1778
  bookNote: Vergennes' dispatches
