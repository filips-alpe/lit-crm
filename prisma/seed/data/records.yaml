  idNote: bagatelle no. 6
- order: correspondance-philosophes
  type: lettre
  date: 1780-06-15T00:00:00.000Z
  allDay: true
  note: From J. Adams, Paris — angry about a perceived slight in my dispatches to Congress. Replied gently. Mr Adams suspects everyone, which I find occasionally useful but mostly exhausting.
  idNote: PBF vol 32 doc 467
  remindTo: bfranklin
