  date: 1785-07-10T00:00:00.000Z
  sum: 0
  totalPrice: 0
  note: Received the diamond portrait of His Most Christian Majesty this day, value c. 90,000 l.t. Gift on my departure.
  footNote: gift; logged for transparency.
  idNote: royal gift on departure
  priceNote: — (gift in kind)
- order: domicile-market-street
  type: lettre
  date: 1786-04-22T00:00:00.000Z
  allDay: true
  note: Wrote to William Franklin, London — formal, brief, on the disposition of certain papers and lands in New Jersey. Have not forgiven him for taking the King's side. Will not.
  footNote: last warm correspondence between them was 1773
  idNote: PBF vol 44 doc 220
  placeTo: London
- order: domicile-market-street
  type: note
  date: 1786-06-08T00:00:00.000Z
  note: Benny (my grandson B. F. Bache) returned to me from Geneva at last, finishing his schooling. Am setting him up at Market Street with the founts and press from Passy. He shall be a printer, like his grandfather.
  idNote: family
- order: domicile-market-street
  type: reunion
  date: 1787-05-25T00:00:00.000Z
  hours: 5
  startDate: 1787-05-25T08:23:26.000Z
  endDate: 1787-05-25T13:23:26.000Z
  note: The Convention opens. Was carried in a sedan chair (a gift from a French friend) — the cobbles too painful for my carriage. Will dine the delegates at Market Street through the summer; cook to plan for 20.
  placeTo: Philadelphia, State House
- order: correspondance-philosophes
  type: lettre
  date: 1787-09-17T00:00:00.000Z
  allDay: true
  note: Convention rises. Wrote to Mme Helvétius, by the next packet — describing the Federal Constitution as the work of a long, tedious, but ultimately good-humoured assembly. Famous remark about the rising sun on the back of the President's chair.
  footNote: '"I have the happiness to know that it is a rising and not a setting sun"'
  idNote: PBF vol 36 doc 244
  placeTo: Philadelphia
- order: correspondance-philosophes
  type: lettre
  date: 1788-11-13T00:00:00.000Z
  allDay: true
  note: To T. Jefferson, Paris — on his projected return to America, and on the news of M. Necker recalled. Storms gathering in France; the king's health alarmingly indifferent. (Of Louis I mean; the queen as bright as ever.)
  idNote: PBF vol 38 doc 280
- order: correspondance-philosophes
  type: lettre
  date: 1789-08-27T00:00:00.000Z
  allDay: true
  note: From the Marquis de Lafayette, Paris — the Declaration of the Rights of Man and of the Citizen voted yesterday by the National Assembly. Asks for my emendations on the draft (sent in July). The work, he writes, is mine and Mr Jefferson's as much as France's.
  idNote: PBF vol 46 doc 318
  placeFrom: Paris
- order: experimentations-electricite
  type: temps
  date: 1789-10-15T00:00:00.000Z
  hours: 2.5
  note: Bifocal spectacles, finally settled in design. Optician in town to make my frames.
  idNote: PBF vol 46 doc 318
  remindTo: bfranklin
