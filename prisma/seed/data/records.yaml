  type: lettre
  date: 1782-04-22T00:00:00.000Z
  allDay: true
  note: To J. Adams, The Hague — sending a copy of the Supplement. "If they are genuine, which I rather doubt, they prove a horrid disposition in the enemy." The plausible-deniability formula. Adams will understand.
  idNote: PBF vol 37 doc 174
- order: experimentations-electricite
