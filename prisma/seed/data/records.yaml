  text: >-
    Printed today: "Supplement to the Boston Independent Chronicle. Numb. 705."
    Dated Boston, 12 March 1782. Datelined falsely by me. 100 copies. To be
    slipped into packets going to London friends — Mr Strahan in particular —
    and to the Amsterdam press.
  note: "The Supplement, our most ambitious forgery of the war. No public sale. — propaganda forgery."
