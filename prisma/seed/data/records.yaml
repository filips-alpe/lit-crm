  totalPrice: -300
  note: 'Am dismissed as Deputy Postmaster General for North America by letter from Anthony Todd. The proximate retaliation. Loss: £300 stg. per annum.'
  footNote: punitive
  idNote: PBF vol 21 doc 40
  priceNote: £ stg.
- order: agence-londres-1757-1775
  type: note
  date: 1774-12-19T00:00:00.000Z
  user: dfranklin
  note: Word reached me of Deborah's death. Five weeks ago. She is dead and I in London. Forty-four years married and I last saw her in 1764. The fault is partly mine.
  placeFrom: Philadelphia
  placeTo: London
- order: agence-londres-1757-1775
  type: note
  date: 1775-03-22T00:00:00.000Z
  note: Embarked at Portsmouth. Voyage of six weeks home, knowing war has begun though not yet hearing of Lexington. Began on the passage a paper on the Gulf Stream, sounding the temperature daily.
  idNote: Gulf Stream chart 1775
  placeTo: at sea
- order: legation-paris-1776-1785
  type: note
  date: 1776-12-21T00:00:00.000Z
  note: Landed at Auray, Brittany. Crossing in the Reprisal an adventure — we captured two British prizes en route. To Paris by easy stages. The whole nation watching me.
  idNote: PBF vol 23 doc 56
  placeTo: Auray
