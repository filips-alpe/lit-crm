- projects: [pennsylvania-abolition-society]
  type: lettre
  date: 1790-02-03T00:00:00.000Z
  allDay: true
  remindTo: bfranklin
  to: 'New York, Federal Hall'
  title: "PAS memorial presented to Congress"
  description: "Signed B. Franklin, President; presented to the First Congress by James Pemberton."
  text: >-
    Memorial of the Pennsylvania Society for Promoting the Abolition of
    Slavery, signed B. Franklin, President. Presented to the First Congress this
    day by James Pemberton. The text, in part, as printed for the House:
    "Mankind are all formed by the same Almighty Being, alike objects of his
    care, and equally designed for the enjoyment of happiness, the Christian
    religion teaches us to believe, and the political creed of America fully
    coincides with the position. Your memorialists, particularly engaged in
    attending to the distresses arising from slavery, believe it their
    indispensable duty to present this subject to your notice. They have
    observed with great satisfaction that many important and salutary powers
    are vested in you for promoting the welfare and securing the blessings of
    liberty to the people of the United States; and as they conceive that these
    blessings ought rightfully to be administered without distinction of colour
    to all descriptions of people, so they indulge themselves in the pleasing
    expectation that nothing which can be done for the relief of the unhappy
    objects of their care will be either omitted or delayed."
  references: ['PBF vol 47 doc 8']
- projects: [correspondance-philosophes]
  type: lettre
  date: 1790-03-09T00:00:00.000Z
  allDay: true
  title: "To Ezra Stiles — on the divinity of Jesus"
  description: "Some doubts, but I shall soon know the truth with less trouble."
  text: >-
    To Ezra Stiles, Yale — on the question of the divinity of Jesus, which he
    asks me directly. Answer that I have some doubts but think it needless to
    busy myself with them now, as I shall soon have opportunity to know the
    truth with less trouble.
  references: ['PBF vol 47 doc 71']
- projects: [pennsylvania-abolition-society]
  type: lettre
  date: 1790-03-23T00:00:00.000Z
  allDay: true
  unit: '£ Pa.'
  to: Philadelphia
  title: "'Sidi Mehemet Ibrahim on the Slave Trade'"
  description: "A satire answering Congressman Jackson, under the name Historicus."
  text: >-
    Wrote to the Federal Gazette — "Sidi Mehemet Ibrahim on the Slave Trade."
    My satirical piece imagining an Algerian arguing for white Christian
    slavery using the exact arguments Congressman Jackson made on Feb 11. Sent
    it to print under my pseudonym Historicus.
  note: "Satirical method learned from Voltaire. — pseudonymous: Historicus."
  references: ['PBF vol 47 doc 79']
