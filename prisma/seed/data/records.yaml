  date: 1784-03-09T00:00:00.000Z
  allDay: true
  note: To Mesmer's commission — appointed by the King with Lavoisier, Bailly, Guillotin, and others to investigate animal magnetism. The blindfolded experiments will, I expect, end this fashionable craze.
  idNote: PBF vol 42 doc 80
- order: correspondance-philosophes
  type: lettre
  date: 1784-04-04T00:00:00.000Z
  allDay: true
  note: To my daughter Sally — on the Society of the Cincinnati, the proposed hereditary order of officers. Am against it on principle of equal citizenship. Includes the famous discussion of the bald eagle vs the turkey.
  footNote: private letter, never intended for publication
  idNote: PBF vol 42 doc 6
  placeFrom: Passy
