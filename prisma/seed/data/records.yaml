- order: legation-paris-1776-1785
  type: note
  date: 1777-12-04T00:00:00.000Z
  note: Word of Burgoyne's surrender at Saratoga reached me in Paris this evening. Saw M. de Vergennes within the hour. He smiled. The treaties will follow.
  idNote: PBF vol 25 doc 320
