  type: lettre
  date: 1789-11-08T00:00:00.000Z
  allDay: true
  note: From G. Sharp — he encloses a presentation copy of The Interesting Narrative of the Life of Olaudah Equiano, or Gustavus Vassa, the African. Equiano sends his "most respectful compliments" to me and the PAS.
  idNote: Sharp forwards copies to American allies
  placeFrom: London
- order: pennsylvania-abolition-society
  type: lettre
  date: 1790-02-03T00:00:00.000Z
  allDay: true
  note: 'Memorial of the Pennsylvania Society for Promoting the Abolition of Slavery, signed B. Franklin, President. Presented to the First Congress this day by James Pemberton. The text, in part, as printed for the House: "Mankind are all formed by the same Almighty Being, alike objects of his care, and equally designed for the enjoyment of happiness, the Christian religion teaches us to believe, and the political creed of America fully coincides with the position. Your memorialists, particularly engaged in attending to the distresses arising from slavery, believe it their indispensable duty to present this subject to your notice. They have observed with great satisfaction that many important and salutary powers are vested in you for promoting the welfare and securing the blessings of liberty to the people of the United States; and as they conceive that these blessings ought rightfully to be administered without distinction of colour to all descriptions of people, so they indulge themselves in the pleasing expectation that nothing which can be done for the relief of the unhappy objects of their care will be either omitted or delayed."'
  idNote: PBF vol 47 doc 8
  placeTo: New York, Federal Hall
  remindTo: bfranklin
- order: correspondance-philosophes
  type: lettre
  date: 1790-03-09T00:00:00.000Z
  allDay: true
  note: To Ezra Stiles, Yale — on the question of the divinity of Jesus, which he asks me directly. Answer that I have some doubts but think it needless to busy myself with them now, as I shall soon have opportunity to know the truth with less trouble.
  idNote: PBF vol 47 doc 71
- order: pennsylvania-abolition-society
  type: lettre
  date: 1790-03-23T00:00:00.000Z
  allDay: true
  note: Wrote to the Federal Gazette — "Sidi Mehemet Ibrahim on the Slave Trade." My satirical piece imagining an Algerian arguing for white Christian slavery using the exact arguments Congressman Jackson made on Feb 11. Sent it to print under my pseudonym Historicus.
  footNote: satirical method learned from Voltaire
  idNote: PBF vol 47 doc 79
  typeNote: 'pseudonymous: Historicus'
  priceNote: £ Pa.
  placeTo: Philadelphia
- order: correspondance-philosophes
  type: note
  date: 1790-04-12T00:00:00.000Z
  user: phewson
  note: Failing now. The pleurisy returned. Polly Hewson and Sally by the bed. Asked Sally to change the bedclothes "that I may die in a decent manner."
  footNote: recorded at the bedside by Polly Hewson
  idNote: last conscious entry
  placeTo: Philadelphia, Market Street
