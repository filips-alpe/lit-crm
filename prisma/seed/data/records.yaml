  to: 'Philadelphia, Market Street'
  title: "The last entry"
  description: "The pleurisy returned; 'that I may die in a decent manner.'"
  text: >-
    Failing now. The pleurisy returned. Polly Hewson and Sally by the bed.
    Asked Sally to change the bedclothes "that I may die in a decent manner."
  note: "Recorded at the bedside by Polly Hewson."
  references: ['last conscious entry']
