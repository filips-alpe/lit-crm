  endDate: 1783-09-03T11:23:26.000Z
  note: Treaty of Paris signed at the Hôtel d'York. Hartley for Britain; Adams, Jay, self for the United States. The independence of the United States acknowledged. Seven years' work concluded.
  idNote: Treaty of Paris, 3 Sep 1783
  placeTo: Paris, Hôtel d'York
- order: legation-paris-1776-1785
