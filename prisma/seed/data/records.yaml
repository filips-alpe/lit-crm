  type: note
  date: 1782-03-12T00:00:00.000Z
  note: 'Printed today: "Supplement to the Boston Independent Chronicle. Numb. 705." Dated Boston, 12 March 1782. Datelined falsely by me. 100 copies. To be slipped into packets going to London friends — Mr Strahan in particular — and to the Amsterdam press.'
  footNote: the Supplement, our most ambitious forgery of the war
  idNote: forgery printed
  orderNote: cross-ref legation-paris
  typeNote: propaganda forgery
  priceNote: — (no public sale)
  placeTo: Passy
