  endDate: 1778-04-29T14:23:26.000Z
  note: At the Loge des Neuf Sœurs. M. de Voltaire and self, after twenty minutes of formal salutation in French, embraced à l'américaine. The assembly applauded for some minutes. The old man trembling, much aged. He spoke to me of Calas and of the Address to Congress he had drafted on hearing of the alliance.
  idNote: PBF vol 26 doc 313
  bookNote: witnessed by Court de Gébelin and the Loge
  placeTo: Paris, Loge des Neuf Sœurs
