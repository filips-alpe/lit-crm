  endDate: 1766-02-13T15:23:26.000Z
  note: Examined at the bar of the House of Commons on the Stamp Act. 174 questions, friendly and hostile. The Act repealed within a month. The greatest day of my public life.
  idNote: PBF vol 13 doc 124
  placeTo: London, House of Commons
- order: imprimerie-philadelphia
  type: note
  date: 1766-07-01T00:00:00.000Z
  note: Partnership with D. Hall dissolved this day, 18 years to the day from our formation. Continuing tail of accounts to settle.
  idNote: PBF vol 13 doc 250
- order: agence-londres-1757-1775
  type: lettre
  date: 1772-12-02T00:00:00.000Z
  allDay: true
  note: Wrote to Thomas Cushing, Boston — sending him a packet of letters from Governor Hutchinson and Lt-Gov Oliver to former Undersecretary Whately. The Massachusetts House to see, not to print. The originals must return to me.
  idNote: PBF vol 19 doc 348
- order: agence-londres-1757-1775
  type: reunion
  date: 1774-01-29T00:00:00.000Z
  hours: 4
  startDate: 1774-01-29T09:23:26.000Z
  endDate: 1774-01-29T13:23:26.000Z
  note: Before the Privy Council at the Cockpit. Solicitor-General Wedderburn's hour of personal abuse, the council chamber full of laughing lords. Stood, silent, in my Manchester velvet suit. Did not move a feature.
  idNote: PBF vol 21 doc 36
  priceNote: — (no payment, only humiliation)
  placeTo: London, Privy Council, Cockpit
- order: agence-londres-1757-1775
