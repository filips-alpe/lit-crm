  note: Drafted the "Extract of a Letter from Captain Gerrish, of the New England Militia" — invoice of scalps purportedly captured from Seneca warriors, addressed to Governor Haldimand. Eight bundles; total 1062 scalps; details of women, boys, infants. Designed to inflame opinion in London and Amsterdam.
