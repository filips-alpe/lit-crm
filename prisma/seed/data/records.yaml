  startDate: 1782-06-15T13:23:26.000Z
  endDate: 1782-06-15T17:23:26.000Z
  note: Visited M. Lavoisier at the Arsenal. Observed his new pneumatic apparatus and his demonstration of the composition of water by combination of inflammable air and dephlogisticated air. Most remarkable. Mme Lavoisier translated for me.
  idNote: PBF vol 37 doc 408
  placeTo: Paris, Arsenal
- order: experimentations-electricite
  type: note
  date: 1782-08-19T00:00:00.000Z
  note: Witnessed at Mr Charles's the ascent of the first inflammable-air balloon from the Champ de Mars. To Mr Pringle and others who ask me "what use" I answered — "What use is a newborn baby?"
  idNote: PBF vol 38 doc 11
  placeTo: Paris, Champ de Mars
